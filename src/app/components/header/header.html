<header class="taxifem-header px-4 py-3 d-flex align-items-center justify-content-between">
  <a class="brand-container d-flex align-items-center text-decoration-none" routerLink="/">
    <img src="https://d585tldpucybw.cloudfront.net/sfimages/default-source/blogs/2024/2024-04/angular-logo.png?sfvrsn=543455a3_2" alt="TaxiFem Logo" class="brand-logo me-2">
    <span class="brand-name fw-bold">TaxiFem</span>
  </a>

  <nav class="nav-pills-container d-flex align-items-center">
    <ul class="nav nav-pills">
      <li class="nav-item">
        <a class="nav-link" routerLink="/operadora" routerLinkActive="active">Operadora</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Pasajera</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/conductora" routerLinkActive="active">Conductora</a>
      </li>
    </ul>
