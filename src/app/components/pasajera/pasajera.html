<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiFem - Solicitar Viaje</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

    <!-- Header -->
    <header class="header">
        <div class="logo-container">
            <div class="logo">🌸</div>
            <h2>TaxiFem</h2>
        </div>

        <div class="roles">
            <button>Operadora</button>
            <button class="active">Pasajera</button>
            <button>Conductora</button>
        </div>
    </header>

    <!-- Navegación -->
    <nav class="tabs">
        <button class="tab active">➕ Solicitar viaje</button>
        <button class="tab">🚕 Mi viaje</button>
    </nav>

    <!-- Contenido -->
    <main class="content">

        <h1>Solicitar viaje</h1>
        <p class="subtitle">
            Completa el formulario para tu próximo viaje
        </p>

        <!-- Ruta -->
        <section>
            <h3>RUTA</h3>

            <label>Punto de origen *</label>
            <div class="input-icon">
                <span>🟢</span>
                <input type="text"
                       placeholder="Ej. Plaza Belgrano, Barrio Gorriti...">
            </div>

            <label>Destino *</label>
            <div class="input-icon">
                <span>📍</span>
                <input type="text"
                       placeholder="Ej. Hospital Pablo Soria, Alto Comedero...">
            </div>

            <div class="trip-card">
                <div class="trip-title">
                    ⚡ Viaje inmediato
                </div>
                <p>Solo se pueden solicitar viajes para ahora mismo</p>
            </div>
        </section>

        <!-- Preferencias -->
        <section>
            <h3>PREFERENCIAS</h3>

            <div class="row">

                <div class="field">
                    <label>👥 Pasajeros</label>
                    <select>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                    </select>
                </div>

                <div class="field">
                    <label>🚖 Tipo de servicio</label>
                    <select>
                        <option>estándar</option>
                        <option>premium</option>
                        <option>adaptado</option>
                    </select>
                </div>

            </div>

            <label>Notas adicionales (opcional)</label>
            <textarea
                placeholder="Ej. Frente al kiosco de la esquina, portón verde, accesibilidad...">
            </textarea>

        </section>

        <button class="continue-btn">
            Continuar →
        </button>

    </main>

</div>

</body>
</html>
